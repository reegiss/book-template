mainfont: "Palatino"
sansfont: "Helvetica"
monofont: "JetBrains Mono"
fontsize: 11pt
geometry:
  - paperwidth=6in
  - paperheight=9in
  - inner=1.9cm
  - outer=1.27cm
  - top=1.9cm
  - bottom=2.2cm
  - twoside
header-includes: |
  \usepackage{xcolor}
  \usepackage{tikz}
  \usepackage{fvextra}
  \DefineVerbatimEnvironment{Highlighting}{Verbatim}{commandchars=\\\{\},breaklines,breakanywhere,fontsize=\footnotesize}
  \RecustomVerbatimEnvironment{verbatim}{Verbatim}{breaklines,breakanywhere,fontsize=\footnotesize}
  \usepackage{etoolbox}
  \preto\subsection{\clearpage}
  \renewcommand{\arraystretch}{1.3}
  \AtBeginEnvironment{longtable}{\small}
  \setlength{\emergencystretch}{3em}
  \usepackage{microtype}
  \renewcommand{\maketitle}{}
